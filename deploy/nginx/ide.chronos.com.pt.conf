# Chronos IDE — host navegador (Theia) em ide.chronos.com.pt
# Reverse proxy para o processo Node (chronos-theia.service) em 127.0.0.1:7001.
# Espelha o padrão WebSocket do bloco /app (Reverb) do chronos.com.pt.
#
# Instalar:
#   sudo cp ide.chronos.com.pt.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/ide.chronos.com.pt.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Certificado: emitir via CloudPanel/clpctl OU certbot --nginx -d ide.chronos.com.pt
# (deixe o bloco /.well-known liberado para a validação HTTP-01).

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name ide.chronos.com.pt;

    ssl_certificate     /etc/nginx/ssl-certificates/ide.chronos.com.pt.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/ide.chronos.com.pt.key;

    access_log /home/chronos-ide/logs/nginx/access.log;
    error_log  /home/chronos-ide/logs/nginx/error.log;

    if ($scheme != "https") {
        rewrite ^ https://$host$request_uri permanent;
    }

    location ~ /\.well-known {
        allow all;
    }

    # uploads de workspace
    client_max_body_size 256M;

    location / {
        proxy_pass http://127.0.0.1:7001;
        proxy_http_version 1.1;

        # WebSocket (terminal, language servers, file watcher, conexão do frontend)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
