# electron-builder — Chronos IDE
# Produz instaladores .deb / .AppImage (Linux) e .exe (Windows, via NSIS).
# .exe SÓ deve ser gerado em runner Windows (CI). Linux gera deb/AppImage.
appId: pt.com.chronos.ide
productName: Chronos IDE
executableName: chronos-ide
copyright: Copyright © 2026 Chronos
electronDist: ../../node_modules/electron/dist
electronVersion: 39.8.7
asar: true
asarUnpack:
  - "**/lib/backend/native/**"
  - "**/lib/backend/shell-integrations/**"
  - "**/lib/prebuilds/**"
nodeGypRebuild: false
npmRebuild: false

directories:
  buildResources: resources
  output: dist

files:
  - src-gen
  - lib
  - resources/icons/icon.png
  - resources/ChronosSplash.svg
  - "!**/node_modules/**/*.{md,markdown,ts,map,d.ts.map}"
  - "!**/node_modules/**/{test,tests,__tests__,example,examples,docs}/**"

win:
  icon: resources/icons/icon.ico
  target:
    - nsis

linux:
  icon: resources/icons/icon.png
  category: Development
  vendor: Chronos
  maintainer: Chronos <dev@chronos.com.pt>
  synopsis: Chronos IDE — IDE com o agente Kairos
  target:
    - deb
    - AppImage

mac:
  icon: resources/icons/icon.png
  category: public.app-category.developer-tools
  target:
    - dmg

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  menuCategory: true
  runAfterFinish: true
  artifactName: ChronosIDE-Setup-${version}.${ext}

deb:
  artifactName: ChronosIDE-${version}-${arch}.${ext}

appImage:
  artifactName: ChronosIDE-${version}-${arch}.${ext}

dmg:
  artifactName: ChronosIDE-${version}.${ext}

afterPack: ./scripts/after-pack.js
