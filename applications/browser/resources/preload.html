<div class="theia-preload chronos-preload">
  <style>
    .chronos-preload {
      display: flex;

      background: radial-gradient(circle at 50% 35%, #20254d 0%, #0e1024 70%);
    }
    .chronos-preload::after { content: none; }
    .chronos-splash {
      display: flex;
