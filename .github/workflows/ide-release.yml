name: Chronos IDE - Release

# Gera os instaladores. .exe so e produzido no runner Windows; .deb/.AppImage no Linux.
on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: chronos-ide-linux
          - os: windows-latest
            artifact: chronos-ide-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libx11-dev libxkbfile-dev libsecret-1-dev rpm fakeroot

      - name: Install Yarn (classic)
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --network-timeout 600000

      - name: Build extensions
        run: yarn build:extensions

      - name: Download bundled plugins
        run: yarn workspace @chronos/electron-app download:plugins

      - name: Package desktop app
        run: yarn workspace @chronos/electron-app package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            applications/electron/dist/*.deb
            applications/electron/dist/*.AppImage
            applications/electron/dist/*.exe

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            applications/electron/dist/*.deb
            applications/electron/dist/*.AppImage
            applications/electron/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
